name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: gridsnap/src-tauri -> target

      # Linux: install system dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # macOS: generate .icns icon from 1024x1024 PNG
      - name: Generate macOS icon
        if: startsWith(matrix.platform, 'macos')
        run: |
          mkdir -p gridsnap/src-tauri/icons/icon.iconset
          sips -z 16 16     gridsnap/src-tauri/icons/icon_1024x1024.png --out gridsnap/src-tauri/icons/icon.iconset/icon_16x16.png
          sips -z 32 32     gridsnap/src-tauri/icons/icon_1024x1024.png --out gridsnap/src-tauri/icons/icon.iconset/icon_16x16@2x.png
          sips -z 32 32     gridsnap/src-tauri/icons/icon_1024x1024.png --out gridsnap/src-tauri/icons/icon.iconset/icon_32x32.png
          sips -z 64 64     gridsnap/src-tauri/icons/icon_1024x1024.png --out gridsnap/src-tauri/icons/icon.iconset/icon_32x32@2x.png
          sips -z 128 128   gridsnap/src-tauri/icons/icon_1024x1024.png --out gridsnap/src-tauri/icons/icon.iconset/icon_128x128.png
          sips -z 256 256   gridsnap/src-tauri/icons/icon_1024x1024.png --out gridsnap/src-tauri/icons/icon.iconset/icon_128x128@2x.png
          sips -z 256 256   gridsnap/src-tauri/icons/icon_1024x1024.png --out gridsnap/src-tauri/icons/icon.iconset/icon_256x256.png
          sips -z 512 512   gridsnap/src-tauri/icons/icon_1024x1024.png --out gridsnap/src-tauri/icons/icon.iconset/icon_256x256@2x.png
          sips -z 512 512   gridsnap/src-tauri/icons/icon_1024x1024.png --out gridsnap/src-tauri/icons/icon.iconset/icon_512x512.png
          sips -z 1024 1024 gridsnap/src-tauri/icons/icon_1024x1024.png --out gridsnap/src-tauri/icons/icon.iconset/icon_512x512@2x.png
          iconutil -c icns gridsnap/src-tauri/icons/icon.iconset -o gridsnap/src-tauri/icons/icon.icns
          rm -rf gridsnap/src-tauri/icons/icon.iconset

      # macOS: import code signing certificate
      - name: Import Apple certificate
        if: startsWith(matrix.platform, 'macos') && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm certificate.p12

      - name: Install frontend dependencies
        working-directory: gridsnap
        run: npm ci

      - name: Build Tauri app
        working-directory: gridsnap
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # macOS signing
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS notarization
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npx tauri build --target ${{ matrix.target }}

      # Upload Windows artifacts
      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.label }}
          path: |
            gridsnap/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            gridsnap/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      # Upload macOS artifacts
      - name: Upload macOS artifacts
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.label }}
          path: |
            gridsnap/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      # Upload Linux artifacts
      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.label }}
          path: |
            gridsnap/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            gridsnap/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Rename artifacts to stable names
        run: |
          mkdir -p release
          # Windows
          find artifacts -name '*.exe' -path '*/nsis/*' | head -1 | xargs -I{} cp {} release/GridSnap-windows-x64-setup.exe
          find artifacts -name '*.msi' | head -1 | xargs -I{} cp {} release/GridSnap-windows-x64.msi
          # macOS
          find artifacts -name '*.dmg' | head -1 | xargs -I{} cp {} release/GridSnap-macos-arm64.dmg
          # Linux
          find artifacts -name '*.deb' | head -1 | xargs -I{} cp {} release/GridSnap-linux-x64.deb
          find artifacts -name '*.AppImage' | head -1 | xargs -I{} cp {} release/GridSnap-linux-x64.AppImage
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: release/*
