<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#1C1917"/>

  <!-- Minimal 2x2 grid - just the crosshair intersection -->
  <g stroke="#5C534B" stroke-width="3">
    <line x1="256" y1="100" x2="256" y2="412"/>
    <line x1="100" y1="256" x2="412" y2="256"/>
  </g>

  <!-- Four quadrant cells - subtle rounded rects -->
  <rect x="116" y="116" width="124" height="124" rx="8" stroke="#3D3630" stroke-width="2.5" fill="none"/>
  <rect x="272" y="116" width="124" height="124" rx="8" stroke="#3D3630" stroke-width="2.5" fill="none"/>
  <rect x="116" y="272" width="124" height="124" rx="8" stroke="#3D3630" stroke-width="2.5" fill="none"/>
  <rect x="272" y="272" width="124" height="124" rx="8" stroke="#3D3630" stroke-width="2.5" fill="none"/>

  <!-- Snap target circle at intersection -->
  <circle cx="256" cy="256" r="28" fill="#D4915E" opacity="0.2"/>
  <circle cx="256" cy="256" r="28" stroke="#D4915E" stroke-width="3.5" fill="none"/>
  <circle cx="256" cy="256" r="6" fill="#D4915E"/>

  <!-- Top-right cell filled - active/selected cell indicator -->
  <rect x="276" y="120" width="116" height="116" rx="6" fill="#D4915E" opacity="0.12"/>

  <!-- Small copy icon in top-right cell -->
  <g transform="translate(310, 154)" stroke="#D4915E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="8" y="8" width="26" height="26" rx="3" fill="none"/>
    <path d="M4 28H3a2.5 2.5 0 01-2.5-2.5V3A2.5 2.5 0 013 .5h22.5A2.5 2.5 0 0128 3v1" fill="none"/>
  </g>
</svg>
