<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Transparent background -->

  <!-- 2x2 grid crosshair lines - edge to edge -->
  <g stroke="#5C534B" stroke-width="4">
    <line x1="256" y1="28" x2="256" y2="484"/>
    <line x1="28" y1="256" x2="484" y2="256"/>
  </g>

  <!-- Four quadrant cells - expanded, minimal padding -->
  <rect x="40" y="40" width="204" height="204" rx="14" stroke="#3D3630" stroke-width="3.5" fill="none"/>
  <rect x="268" y="40" width="204" height="204" rx="14" stroke="#3D3630" stroke-width="3.5" fill="none"/>
  <rect x="40" y="268" width="204" height="204" rx="14" stroke="#3D3630" stroke-width="3.5" fill="none"/>
  <rect x="268" y="268" width="204" height="204" rx="14" stroke="#3D3630" stroke-width="3.5" fill="none"/>

  <!-- Snap target circle at center intersection -->
  <circle cx="256" cy="256" r="36" fill="#D4915E" opacity="0.2"/>
  <circle cx="256" cy="256" r="36" stroke="#D4915E" stroke-width="4.5" fill="none"/>
  <circle cx="256" cy="256" r="8" fill="#D4915E"/>

  <!-- Top-right cell highlight - selected cell -->
  <rect x="273" y="45" width="194" height="194" rx="10" fill="#D4915E" opacity="0.12"/>

  <!-- Copy icon in top-right cell -->
  <g transform="translate(338, 108)" stroke="#D4915E" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="10" y="10" width="34" height="34" rx="4" fill="none"/>
    <path d="M5 36H3.5a3.5 3.5 0 01-3.5-3.5V3.5A3.5 3.5 0 013.5 0H32a3.5 3.5 0 013.5 3.5V5" fill="none"/>
  </g>
</svg>
